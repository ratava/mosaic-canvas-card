<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 128" width="100%" height="100%">
  <!--
    Semicircle gauge with 25 tick marks and a rotating needle.
    Center pivot: (100, 108).  Arc radius: 75.  Outer tick radius: 92.
    McFill rotates the [data-needle] group: -90deg at 0%, +90deg at 100%.
    Tick colours interpolate red (#e53935) → orange (#fb8c00) → yellow (#ffd600).
  -->

  <!-- Arc track -->
  <path d="M 25,108 A 75,75 0 0 1 175,108"
        fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ── Tick marks ─────────────────────────────────────────────────────────── -->
  <!-- Major ticks (i=0,6,12,18,24): stroke-width 2.5, inner radius 75 (at arc) -->
  <!-- Minor ticks: stroke-width 1.5, inner radius 80                           -->

  <!-- i=0  (major 0%) -->
  <line x1="8.0"   y1="108.0" x2="25.0"  y2="108.0" stroke="#e53935" stroke-width="2.5" stroke-linecap="round"/>
  <!-- i=1 -->
  <line x1="8.8"   y1="95.9"  x2="20.7"  y2="97.5"  stroke="#e74031" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=2 -->
  <line x1="11.1"  y1="84.2"  x2="22.7"  y2="87.3"  stroke="#e9472c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=3 -->
  <line x1="15.0"  y1="72.8"  x2="26.1"  y2="77.4"  stroke="#eb4e28" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=4 -->
  <line x1="20.3"  y1="62.0"  x2="30.7"  y2="68.0"  stroke="#ec5523" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=5 -->
  <line x1="27.0"  y1="52.0"  x2="36.6"  y2="59.3"  stroke="#ee5c1f" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=6  (major 25%) -->
  <line x1="35.0"  y1="43.0"  x2="47.0"  y2="55.0"  stroke="#f0631b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- i=7 -->
  <line x1="44.0"  y1="35.0"  x2="51.3"  y2="44.6"  stroke="#f26916" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=8 -->
  <line x1="54.0"  y1="28.3"  x2="60.0"  y2="38.7"  stroke="#f47012" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=9 -->
  <line x1="64.8"  y1="23.0"  x2="69.4"  y2="34.1"  stroke="#f6770d" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=10 -->
  <line x1="76.2"  y1="19.1"  x2="79.3"  y2="30.7"  stroke="#f77e09" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=11 -->
  <line x1="87.9"  y1="16.8"  x2="89.5"  y2="28.7"  stroke="#f98504" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=12 (major 50%) -->
  <line x1="100.0" y1="16.0"  x2="100.0" y2="33.0"  stroke="#fb8c00" stroke-width="2.5" stroke-linecap="round"/>
  <!-- i=13 -->
  <line x1="112.1" y1="16.8"  x2="110.5" y2="28.7"  stroke="#fb9200" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=14 -->
  <line x1="123.8" y1="19.1"  x2="120.7" y2="30.7"  stroke="#fb9800" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=15 -->
  <line x1="135.2" y1="23.0"  x2="130.6" y2="34.1"  stroke="#fc9e00" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=16 -->
  <line x1="146.0" y1="28.3"  x2="140.0" y2="38.7"  stroke="#fca500" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=17 -->
  <line x1="156.0" y1="35.0"  x2="148.7" y2="44.6"  stroke="#fcab00" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=18 (major 75%) -->
  <line x1="165.0" y1="43.0"  x2="153.0" y2="55.0"  stroke="#fcb100" stroke-width="2.5" stroke-linecap="round"/>
  <!-- i=19 -->
  <line x1="173.0" y1="52.0"  x2="163.4" y2="59.3"  stroke="#fcb700" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=20 -->
  <line x1="179.7" y1="62.0"  x2="169.3" y2="68.0"  stroke="#fcbd00" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=21 -->
  <line x1="185.0" y1="72.8"  x2="173.9" y2="77.4"  stroke="#fdc300" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=22 -->
  <line x1="188.9" y1="84.2"  x2="177.3" y2="87.3"  stroke="#fec900" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=23 -->
  <line x1="191.2" y1="95.9"  x2="179.3" y2="97.5"  stroke="#fecf00" stroke-width="1.5" stroke-linecap="round"/>
  <!-- i=24 (major 100%) -->
  <line x1="192.0" y1="108.0" x2="175.0" y2="108.0" stroke="#ffd600" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── Needle ───────────────────────────────────────────────────────────────
       Outer <g> handles SVG translation to pivot (100,108).
       Inner <g data-needle> is what McFill rotates via CSS transform.
       Bounding box of path: x[-3,3] y[-68,0] → transform-origin 50% 100% = (0,0).
  -->
  <g transform="translate(100, 108)">
    <g data-needle="1">
      <path d="M 0,-68 C -1,-40 -3,-15 -3,0 L 3,0 C 3,-15 1,-40 0,-68 Z"
            fill="#f07020"/>
    </g>
    <circle cx="0" cy="0" r="5.5"
            fill="rgba(255,255,255,0.85)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  </g>

  <!-- Label text elements — populated by McFill when gauge_* config is set -->
  <text data-min-label="" x="20"  y="122" text-anchor="middle" font-size="11" fill="#cccccc" style="display:none"></text>
  <text data-max-label="" x="180" y="122" text-anchor="middle" font-size="11" fill="#cccccc" style="display:none"></text>
  <text data-value=""     x="100" y="84"  text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#ffffff" font-weight="600" style="display:none"></text>
</svg>
